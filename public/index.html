<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IndyCar Agendamentos</title>
  <meta name="description" content="Sistema web de gestão de agendamentos automotivos com dashboard, cadastro de clientes, consultores e persistência em banco de dados." />
  <meta name="theme-color" content="#e6192e" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="IndyCar" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <!-- ===================== SIDEBAR ===================== -->
    <aside class="sidebar">
      <div class="logo">
        <span>INDY</span><span>CAR</span>
      </div>
      <nav class="nav" id="nav">
        <a class="nav-item active" data-route="inicio">
          <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8v9a2 2 0 0 1-2 2h-4v-7h-6v7H5a2 2 0 0 1-2-2z"/></svg>
          <span>INÍCIO</span>
        </a>
        <a class="nav-item" data-route="agenda">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          <span>AGENDA</span>
        </a>
        <a class="nav-item" data-route="crm">
          <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="13" width="3" height="4"/></svg>
          <span>CRM</span>
        </a>
        <a class="nav-item" data-route="clientes">
          <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/></svg>
          <span>CLIENTES</span>
        </a>
        <a class="nav-item" data-route="whatsapp">
          <svg viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 0 1-12.3 7.4L3 21l2.2-5.6A8.4 8.4 0 1 1 21 11.5z"/></svg>
          <span>WHATSAPP</span>
        </a>
        <a class="nav-item" data-route="followup">
          <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-7 3.3M3 4v4h4"/></svg>
          <span>FOLLOW-UP</span>
          <em class="badge" id="badgeFollowup">0</em>
        </a>
        <a class="nav-item" data-route="equipe">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>EQUIPE</span>
        </a>
        <a class="nav-item" data-route="historico">
          <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8M3 3v5h5"/><path d="M12 7v5l3 2"/></svg>
          <span>HISTÓRICO</span>
        </a>
        <a class="nav-item" data-route="conectores">
          <svg viewBox="0 0 24 24"><path d="M9 7V3M15 7V3M7 7h10v4a5 5 0 0 1-10 0zM12 16v5"/></svg>
          <span>CONECTORES</span>
        </a>
      </nav>
      <div class="avatar-bottom">IC</div>
    </aside>

    <!-- ===================== CONTEÚDO ===================== -->
    <main class="main">
      <header class="topbar">
        <div class="company">
          <div class="company-logo">IC</div>
          <div>
            <div class="company-title">
              <h1 id="empresaNome">IndyCar Centro Automotivo</h1>
              <span class="tag-dashboard" id="pageTag">DASHBOARD</span>
            </div>
            <div class="company-sub">
              <span id="empresaEndereco">Av. Bandeirantes, 875 — Taubaté/SP</span>
              <em id="empresaSlogan">Quem conhece, indica!</em>
            </div>
          </div>
        </div>
        <button class="btn-novo" id="btnNovo">
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Novo agendamento
        </button>
      </header>

      <section class="view" id="view"><!-- preenchido por app.js --></section>
    </main>
  </div>

  <!-- ===================== MODAL ===================== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal"><!-- preenchido por app.js --></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="/vendor/qrcode.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
